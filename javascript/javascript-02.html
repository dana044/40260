<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso</title>
    <link rel="stylesheet" href="javascript-02.css"
</head>
<body>
    <h1>Calculadora</h1>
    
    <input type="number" id="resultado" width="100px">
    
    <!-- button{$}[id="b$"]*10 --> 
    <div id="todo">
        <div>
            <button id="b1">1</button>
            <button id="b2">2</button>
            <button id="b3">3</button>
            <button id="b4">4</button>
            <button id="b5">5</button>
            <button id="b6">6</button>
            <button id="b7">7</button>
            <button id="b8">8</button>
            <button id="b9">9</button>
            <button id="b0">0</button>
        </div>
        <div id="operador">
            <button class="operadores">+</button>
            <button class="operadores">-</button>
            <button class="operadores">*</button>
            <button class="operadores">/</button>
            <button class="operadores">Ce</button>
            <button class="operadores">=</button>
        </div>
    </div>
    

    <script src="javascript-02.js"></script>
</body>
</html>
